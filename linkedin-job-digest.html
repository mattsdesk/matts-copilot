<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Job Digest</title>
    <script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" integrity="sha384-jZvDSsmGB9oGGT/4l9bHXGoAv1OxvG/cFmSo0dZaSqmBgvQTKDBFAMftlXTmMbNW" crossorigin="anonymous">
    <style>
        :root {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #333;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .date {
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 1.5rem;
        }

        .table-wrapper {
            margin-bottom: 1.5rem;
        }

        .gridjs-wrapper {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .gridjs-head {
            background: #f5f5f5;
        }

        .gridjs-th {
            background: #f5f5f5;
            font-weight: 600;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .gridjs-td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .gridjs-tr:last-child .gridjs-td {
            border-bottom: none;
        }

        .gridjs-tr:hover {
            background: #fafafa;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .view-btn {
            display: inline-block;
            padding: 6px 12px;
            background: #0066cc;
            color: white;
            border-radius: 3px;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .view-btn:hover {
            background: #0052a3;
            text-decoration: none;
        }

        .footer {
            font-size: 0.875rem;
            color: #666;
            margin-top: 1rem;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #666;
            font-size: 1.125rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LinkedIn Job Digest</h1>
        <div class="date">May 9, 2026</div>

        <div class="table-wrapper" id="table-container"></div>

        <div class="footer" id="footer"></div>
    </div>

    <script>
        const jobs = [
            {
                title: "VP, Product Management - Tech",
                company: "Warner Bros. Discovery",
                industry: "Entertainment/Media",
                location: "New York, NY",
                salary: "Not listed",
                link: "https://www.linkedin.com/comm/jobs/view/4410989895/"
            },
            {
                title: "Vice President of Products",
                company: "Lumen Resources",
                industry: "Telecommunications/Tech",
                location: "New York City Metropolitan Area",
                salary: "Not listed",
                link: "https://www.linkedin.com/comm/jobs/view/4399402285/"
            },
            {
                title: "Leader, Technology Products",
                company: "Success Academy Charter Schools",
                industry: "Education",
                location: "New York, NY",
                salary: "Not listed",
                link: "https://www.linkedin.com/comm/jobs/view/4402091946/"
            },
            {
                title: "Senior Director, Enterprise Product Management",
                company: "Chobani",
                industry: "Consumer Goods/Food & Beverage",
                location: "New York City Metropolitan Area",
                salary: "Not listed",
                link: "https://www.linkedin.com/comm/jobs/view/4409963686/"
            }
        ];

        if (jobs.length === 0) {
            document.getElementById("table-container").innerHTML = '<div class="empty-state">No new LinkedIn job alerts in the last 24 hours.</div>';
        } else {
            const grid = new gridjs.Grid({
                columns: [
                    { name: "Title", width: "25%" },
                    { name: "Company", width: "20%" },
                    { name: "Industry", width: "15%" },
                    { name: "Location", width: "18%" },
                    { name: "Salary", width: "12%" },
                    {
                        name: "Link",
                        width: "10%",
                        formatter: (cell) => gridjs.html(`<a href="${cell}" target="_blank" class="view-btn">View</a>`)
                    }
                ],
                data: jobs.map(job => [
                    job.title,
                    job.company,
                    job.industry,
                    job.location,
                    job.salary,
                    job.link
                ]),
                sort: true,
                search: false,
                pagination: false
            }).render(document.getElementById("table-container"));
        }

        // Update footer with current timestamp
        const now = new Date();
        const timestamp = now.toLocaleString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });
        document.getElementById("footer").textContent = `Last updated: ${timestamp}`;
    </script>
</body>
</html>
