<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Job Digest</title>
    <script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" integrity="sha384-jZvDSsmGB9oGGT/4l9bHXGoAv1OxvG/cFmSo0dZaSqmBgvQTKDBFAMftlXTmMbNW" crossorigin="anonymous">
    <style>
        :root { color-scheme: light; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: white;
            color: #1a1a1a;
            padding: 20px;
            margin: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 24px; margin: 0 0 5px 0; font-weight: 600; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        #grid { margin: 20px 0; }
        .gridjs-wrapper { border: 1px solid #e0e0e0; border-radius: 4px; overflow: hidden; }
        .gridjs-table { width: 100%; border-collapse: collapse; }
        .gridjs-thead { background: #f5f5f5; border-bottom: 2px solid #e0e0e0; }
        .gridjs-th { padding: 12px; text-align: left; font-weight: 600; font-size: 13px; color: #333; }
        .gridjs-td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #1a1a1a; }
        .gridjs-tbody tr:hover { background: #fafafa; }
        .job-link {
            display: inline-block;
            padding: 6px 12px;
            background: #0a66c2;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            text-align: center;
        }
        .job-link:hover { background: #084896; }
        .job-link-na {
            display: inline-block;
            padding: 6px 12px;
            background: #e5e7eb;
            color: #9ca3af;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }
        .empty-state { padding: 40px; text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LinkedIn Job Digest</h1>
        <div class="subtitle">June 9, 2026</div>
        <div id="grid"></div>
        <div class="footer">Last updated: June 9, 2026 at 8:30 AM ET &nbsp;·&nbsp; Filtered: finance industry + salary caps &le;$250K &nbsp;·&nbsp; 1 filtered (BNY &mdash; financial services) &nbsp;·&nbsp; Note: links unavailable this run &mdash; email body exceeded parse limit</div>
    </div>

    <script>
        const jobs = [
            {
                title: "Vice President, Aviation Growth",
                company: "Metropolis Technologies",
                industry: "Mobility/Parking Tech",
                location: "Not available",
                salary: "Not listed",
                url: ""
            }
        ];

        if (jobs.length === 0) {
            document.getElementById('grid').innerHTML = '<div class="empty-state">No new LinkedIn job alerts in the last 24 hours.</div>';
        } else {
            const data = jobs.map(function(job) {
                var linkCell = job.url
                    ? gridjs.html('<a href="' + job.url + '" target="_blank" rel="noopener noreferrer" class="job-link">View</a>')
                    : gridjs.html('<span class="job-link-na">N/A</span>');
                return [job.title, job.company, job.industry, job.location, job.salary, linkCell];
            });

            new gridjs.Grid({
                columns: ['Title', 'Company', 'Industry', 'Location', 'Salary', 'Link'],
                data: data,
                search: true,
                sort: true,
                pagination: { limit: 10 }
            }).render(document.getElementById('grid'));
        }
    </script>
</body>
</html>
